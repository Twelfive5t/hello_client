syntax = "proto3";

option objc_class_prefix = "HLW";

package ServerServiceMessages;

service ServerService {
  rpc CheckOnline (CheckOnlineRequest) returns (CheckOnlineReply) {}
  rpc ExitServer (ExitServerRequest) returns (ExitServerReply) {}
  rpc GetServerVersion (GetServerVersionRequest) returns (GetServerVersionReply) {}
}

message CheckOnlineRequest {
}

message CheckOnlineReply {
}

message ExitServerRequest {
}

message ExitServerReply {
}

message GetServerVersionRequest {
}

message GetServerVersionReply {
  string version = 1;
}
